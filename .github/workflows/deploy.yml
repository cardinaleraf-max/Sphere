name: Deploy via SFTP

on:
  push:
    branches:
      - main

# Evita due deploy sovrapposti sullo stesso server
concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    # Il deploy parte solo quando la variabile di repo DEPLOY_ENABLED è "true".
    # Finché non hai le credenziali nei Secrets, lascia la variabile spenta
    # (o assente): il job viene saltato, non fallisce.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project (static export -> ./out)
        run: npm run build

      # Questo hosting accetta solo SFTP (porta SSH), non FTP semplice.
      # Autenticazione con password: riusa gli stessi Secrets FTP_* già impostati.
      # La porta SSH è quella indicata da cPanel (default 22); se il tuo host
      # usa una porta diversa, impostala nel Secret opzionale SSH_PORT.
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          local_path: './out/*'
          remote_path: '/public_html'
          sftpArgs: '-o ConnectTimeout=15'
