name: Deploy via SFTP

on:
  push:
    branches:
      - main

# Evita due deploy sovrapposti sullo stesso server
concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    # Il deploy parte solo quando la variabile di repo DEPLOY_ENABLED è "true".
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project (static export -> ./out)
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # L'account cPanel espone SOLO il sottosistema SFTP (niente shell/rsync).
      # `lftp mirror -R` gira sul runner e parla puro protocollo SFTP: crea le
      # cartelle e carica i file senza richiedere accesso shell sul server.
      # La porta SSH è quella di cPanel (default 22); override col Secret SSH_PORT.
      - name: Deploy via SFTP (lftp mirror)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$SSH_PORT" "sftp://$FTP_SERVER" <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 20
          set net:reconnect-interval-base 10
          mirror -R --verbose --parallel=2 ./out/ /public_html/
          bye
          EOF
